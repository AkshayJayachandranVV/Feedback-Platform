name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acowale-feedbacker-api

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: acowale-feedbacker-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:cov
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/acowale_test
          JWT_ACCESS_SECRET: ci-access-secret-for-testing
          JWT_REFRESH_SECRET: ci-refresh-secret-for-testing
          COOKIE_SECRET: ci-cookie-secret-for-testing

      - name: Build
        run: npm run build

  frontend-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acowale-feedbacker-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: acowale-feedbacker-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: Acowale Feedbacker
